# powbox: defaults for rootless Podman running inside the agent container.
# Installed as a drop-in (/etc/containers/containers.conf.d/10-powbox.conf) that
# merges over the containers-common base config — keys here win, the rest of the
# base config is left intact.

[engine]
# No systemd inside the container, so use the cgroupfs manager and a file-based
# event logger instead of the journald defaults (which would error at runtime).
cgroup_manager = "cgroupfs"
events_logger = "file"

[network]
# Use netavark (with aardvark-dns) rather than legacy CNI for container DNS.
network_backend = "netavark"
