services:
  codex:
    build:
      context: .
      args:
        CODEX_VERSION: latest
    image: codex-dev:latest
    stdin_open: true
    tty: true
    init: true

    cap_add:
      - NET_ADMIN
      - NET_RAW

    environment:
      - CODEX_CONFIG_DIR=/home/node/.codex
      - CODEX_HOST_SEED_DIR=/home/node/.codex-host
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GH_CONFIG_DIR=/home/node/.config/gh
      - GH_HOST_SEED_DIR=/home/node/.config/gh-host
      - NODE_OPTIONS=--max-old-space-size=4096

    volumes:
      # Working directory (the project you're working on)
      - ${WORKSPACE_PATH:-.}:/workspace:rw

      # Codex config/preferences — persisted in a Docker volume so config.toml
      # survives container recreation and image rebuilds.
      - codex-config:/home/node/.codex

      # GitHub CLI auth/config — shared with Claude containers so gh login and
      # auth state are available to both tools.
      - gh-config:/home/node/.config/gh

      # pnpm store (shared with Claude containers across all projects)
      - pnpm-store:/home/node/.local/share/pnpm/store

      # Zsh history (shared with Claude containers)
      - zsh-history:/home/node/.zsh_history_dir

      # Per-project node_modules overlay (set by launch script)
      # Added dynamically via: -v agent-nm-<project>-<hash>:/workspace/node_modules

volumes:
  codex-config:
    name: codex-config
  gh-config:
    name: claude-gh-config
  pnpm-store:
    name: claude-pnpm-store
  zsh-history:
    name: claude-zsh-history
