services:
  agent:
    stdin_open: true
    tty: true
    init: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      GH_CONFIG_DIR: /home/node/.config/gh
      GH_HOST_SEED_DIR: /home/node/.config/gh-host
      NODE_OPTIONS: --max-old-space-size=4096
    volumes:
      - ${WORKSPACE_PATH:-.}:/workspace/${PROJECT_NAME:-.}:rw
      - gh-config:/home/node/.config/gh
      - pnpm-store:/home/node/.local/share/pnpm/store
      - zsh-history:/home/node/.zsh_history_dir

volumes:
  gh-config:
    name: agent-gh-config
    external: true
  pnpm-store:
    name: agent-pnpm-store
    external: true
  zsh-history:
    name: agent-zsh-history
    external: true
