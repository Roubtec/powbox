name: Native Linux CI - Tier 0 (static guards)

# Tier 0: fast, Docker-free static guards that run on every pull request EXCEPT
# those carrying the repo's `non-code` label (docs/tasks-only changes — see the
# job `if:` below). These reproduce the class of native-Linux defects that
# Windows/WSL masks (git there ignores filemode), in seconds, with no image
# build. Tier 0 alone would have caught PR #51 (a shell script committed without
# its exec bit). The heavier image build + smoke test lives in the path-gated
# Tier 1 workflow (.github/workflows/native-linux-build.yml).
#
# What stays out of CI (VPS-only) is documented in README.md under
# "Continuous Integration".

on:
  pull_request:
    # No paths filter on purpose — Tier 0 runs on every PR. types: the defaults
    # (opened, synchronize, reopened) are spelled out so adding labeled/unlabeled
    # — needed so the `non-code` label gate on the job below re-evaluates when
    # the label is toggled — does not silently drop them.
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: native-linux-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-guards:
    name: Static guards (exec bits, shellcheck, shfmt, PSScriptAnalyzer)
    runs-on: ubuntu-latest
    # Skip the static guards when the PR carries the repo's `non-code` label
    # (docs/tasks-only changes that need no rebuild + full CI). This is the real
    # win of the label, since Tier 0 otherwise runs on every PR. Toggling the
    # label re-evaluates on the next labeled/unlabeled event. Keep this gate
    # expression and label name identical to Tier 1's.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'non-code') }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so the advisory shfmt step can diff against the PR base.
          fetch-depth: 0

      # The acceptance-critical guard: any tracked *.sh committed without its
      # executable bit (the PR #51 regression) fails the job. Reads git index
      # modes, so it is correct even where core.filemode is false.
      - name: Exec-bit guard
        run: ./scripts/check-exec-bits.sh

      # shellcheck ships on ubuntu-latest. Run repo-wide but gate only on
      # error-severity findings: the existing tree carries intentional
      # info/warning patterns (SC1091 sourced-file, SC2016 single-quote, SC2154
      # dynamically-set vars), so error-only keeps Tier 0 green today while still
      # blocking genuine shell bugs in any future PR.
      - name: shellcheck (error severity, whole tree)
        run: |
          # Tracked *.sh files, PLUS extensionless/other tracked files whose
          # shebang names a shellcheck-supported shell (sh/bash/dash/ksh). Many
          # baked helpers ship without a .sh suffix (docker/shared/wt-enter,
          # wt-bootstrap, pg-dev-up, powbox-provenance, …), so a quoting/syntax
          # regression in one would otherwise slip past Tier 0 — the smoke test
          # only checks they are on PATH, not that they parse. zsh/pwsh shebangs
          # are intentionally excluded (shellcheck does not support them).
          mapfile -t files < <(git ls-files -- '*.sh')
          while IFS= read -r f; do
            case "$f" in *.sh) continue ;; esac
            [ -f "$f" ] || continue
            if head -n1 -- "$f" | grep -qE '^#!.*\b(ba|da|k)?sh\b'; then
              files+=("$f")
            fi
          done < <(git ls-files)
          echo "Running shellcheck --severity=error on ${#files[@]} tracked shell file(s)."
          shellcheck --severity=error "${files[@]}"

      - name: Install shfmt
        env:
          SHFMT_VERSION: v3.10.0
          # SHA256 of shfmt_v3.10.0_linux_amd64 from the upstream release's
          # sha256sums.txt. Verified before chmod/exec so a tampered download is
          # never run with the runner's permissions (supply-chain hardening).
          # Bump alongside SHFMT_VERSION.
          SHFMT_SHA256: 1f57a384d59542f8fac5f503da1f3ea44242f46dff969569e80b524d64b71dbc
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL -o "$RUNNER_TEMP/bin/shfmt" \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          echo "${SHFMT_SHA256}  $RUNNER_TEMP/bin/shfmt" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/bin/shfmt"
          echo "$RUNNER_TEMP/bin" >>"$GITHUB_PATH"
          "$RUNNER_TEMP/bin/shfmt" --version

      # The repo is not yet fully shfmt-normalized (several legacy scripts differ
      # from shfmt's default tab style), so a blanket blocking shfmt would be red
      # on a clean branch. Instead, surface formatting drift on the scripts THIS
      # PR adds or changes as a non-blocking advisory — a nudge toward consistent
      # formatting on new code without retroactively reformatting 30 files.
      - name: shfmt (advisory) on changed shell scripts
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          mapfile -t changed < <(git diff --name-only --diff-filter=ACMR "$base" "$head" -- '*.sh')
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "No added/changed *.sh in this PR — nothing for shfmt to check."
            exit 0
          fi
          echo "Changed shell scripts:"
          printf '  %s\n' "${changed[@]}"
          if shfmt -d "${changed[@]}"; then
            echo "shfmt: changed scripts match shfmt formatting."
          else
            echo "::warning::shfmt found formatting differences in changed shell scripts (advisory, not blocking). Run 'shfmt -w <file>' to apply. The repo is not yet fully shfmt-normalized."
          fi

      # pwsh ships on ubuntu-latest; PSScriptAnalyzer does not, so install it.
      # Uses the repo's PSScriptAnalyzerSettings.psd1 (its ExcludeRules mirror the
      # intentional CLI-script patterns). Gate only on error-severity findings so
      # the existing tree's warning/info results do not turn Tier 0 red; all
      # findings are still surfaced as GitHub annotations.
      - name: PSScriptAnalyzer (error severity, whole tree)
        shell: pwsh
        env:
          # Pinned for reproducibility: an unpinned PSGallery install lets a future
          # PSScriptAnalyzer release add error-severity rules that turn a
          # previously-green PR red. 1.25.0 reports 0 error/ParseError findings on
          # this tree; bump deliberately after re-checking.
          PSSA_VERSION: '1.25.0'
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $version = $env:PSSA_VERSION
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer | Where-Object { $_.Version -eq [version]$version })) {
            Install-Module PSScriptAnalyzer -RequiredVersion $version -Force -Scope CurrentUser -Repository PSGallery
          }
          Import-Module PSScriptAnalyzer -RequiredVersion $version
          $findings = @(Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1)
          # A syntactically broken .ps1 surfaces as severity 'ParseError', not
          # 'Error', so it must be in the failure set too — otherwise a broken
          # script is only annotated as a warning and Tier 0 still passes.
          $failSeverities = @('Error', 'ParseError')
          foreach ($f in $findings) {
            $level = if ($failSeverities -contains [string]$f.Severity) { 'error' } else { 'warning' }
            Write-Host ("::{0} file={1},line={2},col={3}::[{4}] {5}" -f $level, $f.ScriptPath, $f.Line, $f.Column, $f.RuleName, $f.Message)
          }
          $errors = @($findings | Where-Object { $failSeverities -contains [string]$_.Severity })
          Write-Host ("PSScriptAnalyzer: {0} finding(s) total, {1} error/parse-severity." -f $findings.Count, $errors.Count)
          if ($errors.Count -gt 0) {
            throw "PSScriptAnalyzer found $($errors.Count) error/parse-severity finding(s) (see ::error annotations above)."
          }
