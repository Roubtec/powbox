# powbox: defaults for rootless Podman running inside the agent container.
# Installed as a drop-in (/etc/containers/containers.conf.d/10-powbox.conf) that
# merges over the containers-common base config — keys here win, the rest of the
# base config is left intact.

[engine]
# No systemd inside the container, so use the cgroupfs manager and a file-based
# event logger instead of the journald defaults (which would error at runtime).
cgroup_manager = "cgroupfs"
events_logger = "file"

[network]
# Use netavark (with aardvark-dns) rather than legacy CNI for container DNS.
network_backend = "netavark"
# Podman 5.x's netavark defaults its firewall driver to "nftables", which needs
# the `nft` binary — not installed in this image. We already ship `iptables`
# (the nf_tables-backed v1.8.x) for the agent's own egress firewall
# (init-firewall.sh), so point netavark at the iptables driver too: it calls the
# existing `iptables` command, needs no extra package, and keeps the whole
# container's firewalling on one interface. Without this, every bridge/compose
# network (and any published port) fails with
# `netavark: nftables error: unable to execute nft: No such file or directory`.
firewall_driver = "iptables"
